name: "gleam"
on:
  push:
    paths:
      - ".github/workflows/gleam.yml"
      - "src/gleam/**"
      - "test/gleam/**"
  pull_request:
    paths:
      - ".github/workflows/gleam.yml"
      - "src/gleam/**"
      - "test/gleam/**"

permissions:
  contents: write

jobs:
  gleam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - run: npm install -g @devcontainers/cli
        name: Install devcontainer CLI

      - run: devcontainer features test --skip-autogenerated -f gleam
        name: Run tests

      - uses: mindsers/changelog-reader-action@v2
        id: changelog_reader
        if: startsWith(github.ref, 'refs/tags/gleam-v')
        with:
          version: ${{ steps.tag_name.outputs.release_tag }}

      - run: devcontainer features publish ./src/gleam
        name: Publish feature
        if: startsWith(github.ref, 'refs/tags/gleam-v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/gleam-v')
        with:
          body: ${{ steps.changelog_reader.outputs.changes }}
          prerelease: ${{ steps.changelog_reader.outputs.status == 'unreleased' }}
