name: Reusable Feature
on:
  workflow_call:
    inputs:
      feature_name:
        description: Name of the feature
        required: true
        type: string
permissions:
  contents: write
  packages: write
jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - run: npm install -g @devcontainers/cli
        name: Install devcontainer CLI

      - run: devcontainer features test --skip-autogenerated -f ${{ inputs.feature_name }}
        name: Run tests

      - run: echo "version=${GITHUB_REF_NAME#${{ inputs.feature_name }}-v}" >> "$GITHUB_OUTPUT"
        name: Extract release version
        id: release_version
        if: startsWith(github.ref, format('refs/tags/{0}-v', inputs.feature_name))

      - uses: mindsers/changelog-reader-action@v2
        id: changelog_reader
        if: startsWith(github.ref, format('refs/tags/{0}-v', inputs.feature_name))
        with:
          path: ./src/${{ inputs.feature_name }}/CHANGELOG.md
          version: ${{ steps.release_version.outputs.version }}

      - run: devcontainer features publish -n nicoviii/devcontainer-features ./src/${{ inputs.feature_name }}
        name: Publish feature
        if: startsWith(github.ref, format('refs/tags/{0}-v', inputs.feature_name))
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, format('refs/tags/{0}-v', inputs.feature_name))
        with:
          body: ${{ steps.changelog_reader.outputs.changes }}
          prerelease: ${{ steps.changelog_reader.outputs.status == 'unreleased' }}
