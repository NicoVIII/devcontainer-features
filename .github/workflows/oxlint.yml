name: "oxlint"
on:
  push:
    paths:
      - ".github/workflows/oxlint.yml"
      - "lib/**"
      - "src/oxlint/**"
      - "test/oxlint/**"
    tags:
  pull_request:
    paths:
      - ".github/workflows/oxlint.yml"
      - "lib/**"
      - "src/oxlint/**"
      - "test/oxlint/**"

permissions:
  contents: write
  packages: write

jobs:
  oxlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - run: npm install -g @devcontainers/cli
        name: Install devcontainer CLI

      - run: devcontainer features test --skip-autogenerated -f oxlint
        name: Run tests

      - run: echo "version=${GITHUB_REF_NAME#oxlint-v}" >> "$GITHUB_OUTPUT"
        name: Extract release version
        id: release_version
        if: startsWith(github.ref, 'refs/tags/oxlint-v')

      - uses: mindsers/changelog-reader-action@v2
        id: changelog_reader
        if: startsWith(github.ref, 'refs/tags/oxlint-v')
        with:
          path: ./src/oxlint/CHANGELOG.md
          version: ${{ steps.release_version.outputs.version }}

      - run: devcontainer features publish -n nicoviii/devcontainer-features ./src/oxlint
        name: Publish feature
        if: startsWith(github.ref, 'refs/tags/oxlint-v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/oxlint-v')
        with:
          body: ${{ steps.changelog_reader.outputs.changes }}
          prerelease: ${{ steps.changelog_reader.outputs.status == 'unreleased' }}
